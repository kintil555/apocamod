name: Build Apocalypse Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle 8.8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Generate Gradle Wrapper JAR
        run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mod
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: apocalypsemod-${{ github.run_number }}
          path: build/libs/apocalypsemod-*.jar
          if-no-files-found: error

      - name: Upload sources jar
        uses: actions/upload-artifact@v4
        with:
          name: apocalypsemod-sources-${{ github.run_number }}
          path: build/libs/*-sources.jar
          if-no-files-found: warn
