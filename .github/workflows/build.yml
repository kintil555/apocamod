name: Build Apocalypse Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Gradle Wrapper JAR (if missing)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -L "https://github.com/gradle/gradle/raw/v8.8.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: apocalypsemod-${{ github.run_number }}
          path: build/libs/apocalypsemod-*.jar
          if-no-files-found: error

      - name: Upload sources jar
        uses: actions/upload-artifact@v4
        with:
          name: apocalypsemod-sources-${{ github.run_number }}
          path: build/libs/*-sources.jar
          if-no-files-found: warn
